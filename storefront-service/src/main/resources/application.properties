server.port=8080
spring.application.name=storefront-service
product.service.url=http://localhost:8081
cart.service.url=http://localhost:8082
order.service.url=http://localhost:8083
internal.api.token=${INTERNAL_API_TOKEN:demo-internal-token}
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin123}
spring.datasource.url=jdbc:h2:file:./data/storefront-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
upload.dir=./uploads
